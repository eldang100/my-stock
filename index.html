<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;color-scheme:light only}
html,body{height:100%;background:#F5F0E8 !important;overscroll-behavior:none;-webkit-text-size-adjust:100%;filter:none !important}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;color:#1A1A2E;max-width:480px;margin:0 auto;overflow-x:hidden}
#app{display:flex;flex-direction:column;height:100dvh;height:100vh}
#header{background:linear-gradient(150deg,#2C2C3E 0%,#1E1E2E 45%,#2A2040 100%);border-bottom:2px solid rgba(212,168,83,0.35);flex-shrink:0;padding:env(safe-area-inset-top,0) 0 0;box-shadow:0 4px 20px rgba(0,0,0,0.25)}
#tab-content{flex:1;overflow-y:auto;padding:12px 13px 24px;-webkit-overflow-scrolling:touch;background:#F5F0E8}
.tab-btn{flex:1;padding:10px 1px;background:rgba(255,255,255,0.07);border:none;color:rgba(255,255,255,0.4);font-size:11px;font-weight:600;cursor:pointer;border-radius:8px 8px 0 0;position:relative;transition:all 0.2s;letter-spacing:-0.3px}
.tab-btn.active{background:#FFFFFF;color:#2C2C3E;font-weight:800;box-shadow:0 -3px 10px rgba(0,0,0,0.12)}
.tab-btn.holdings.active{background:linear-gradient(135deg,#059669,#10B981);color:#fff;box-shadow:0 -3px 10px rgba(220,38,38,0.4)}
.tab-btn.sector.active{background:linear-gradient(135deg,#6D28D9,#8B5CF6);color:#fff;box-shadow:0 -3px 10px rgba(109,40,217,0.4)}
.tab-btn.news.active{background:linear-gradient(135deg,#0369A1,#0EA5E9);color:#fff;box-shadow:0 -3px 10px rgba(3,105,161,0.4)}
.tab-btn.ai.active{background:linear-gradient(135deg,#BE185D,#F472B6);color:#fff;box-shadow:0 -3px 10px rgba(190,24,93,0.4)}
.tab-btn .badge{position:absolute;top:4px;right:calc(50% - 13px);width:6px;height:6px;background:#EF4444;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.15}}
@keyframes slideUp{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
.live-dot{width:7px;height:7px;background:#10B981;border-radius:50%;animation:pulse 1.5s infinite;display:inline-block;margin-right:5px}
::-webkit-scrollbar{width:0}
input,button{-webkit-appearance:none}
.overlay{position:fixed;inset:0;background:rgba(26,26,46,0.55);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
.sheet{background:#FAFAF8;border-radius:22px 22px 0 0;width:100%;max-width:480px;max-height:93dvh;overflow-y:auto;border-top:3px solid #D4A853;padding-bottom:env(safe-area-inset-bottom,20px)}
.supply-bar-track{background:#E8E3DB;border-radius:3px;height:4px;overflow:hidden;margin-top:3px}
.supply-bar-fill{height:100%;border-radius:3px;transition:width 0.8s ease}
</style>

</head>
<body>
<div id="app">
  <div id="header">
    <div style="padding:10px 14px 0;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:36px;height:36px;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(11,58,46,0.5)">
          <svg viewBox="0 0 112 112" style="width:100%;height:100%;display:block">
            <defs>
              <linearGradient id="hdrbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0B3A2E"/><stop offset="1" stop-color="#03150F"/></linearGradient>
              <linearGradient id="hdrgold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F6DD95"/><stop offset="0.5" stop-color="#D9B45C"/><stop offset="1" stop-color="#B8862F"/></linearGradient>
            </defs>
            <rect width="112" height="112" fill="url(#hdrbg)"/>
            <rect x="3" y="3" width="106" height="106" rx="22" fill="none" stroke="url(#hdrgold)" stroke-width="2.6" opacity="0.85"/>
            <g stroke="url(#hdrgold)" stroke-width="2.3" stroke-linecap="round"><line x1="35" y1="42" x2="35" y2="76"/><line x1="56" y1="31" x2="56" y2="83"/><line x1="77" y1="48" x2="77" y2="72"/></g>
            <rect x="29.5" y="50" width="11" height="19" rx="2.5" fill="url(#hdrgold)"/><rect x="50.5" y="41" width="11" height="27" rx="2.5" fill="url(#hdrgold)"/><rect x="71.5" y="54" width="11" height="13" rx="2.5" fill="#3E8F6F"/>
            <polyline points="30,64 51,53 72,60 88,38" fill="none" stroke="#FFF4CF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="88" cy="38" r="4" fill="#FFF4CF"/>
          </svg>
        </div>
        <div>
          <div style="font-size:9px;color:#D4A853;letter-spacing:3px;font-weight:800">M-STOCK</div>
          <div style="font-size:13px;font-weight:700;color:rgba(255,255,255,0.7);margin-top:1px;letter-spacing:0.5px">KRX Tracker</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:5px;background:rgba(212,168,83,0.15);border:1px solid rgba(212,168,83,0.4);border-radius:16px;padding:5px 12px;cursor:pointer" onclick="manualRefresh()" id="refresh-btn">
        <span class="live-dot" id="live-dot"></span><span style="font-size:11px;color:#D4A853;font-weight:700" id="last-update">연결 중...</span>
      </div>
    </div>
    <!-- 장 상태 바 -->
    <div id="next-session-bar" style="margin:0 12px 8px;border-radius:10px;padding:8px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(212,168,83,0.2)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
        <div style="display:flex;align-items:center;gap:6px">
          <span id="session-icon" style="font-size:14px">🕐</span>
          <div>
            <div style="font-size:11px;color:rgba(255,255,255,0.5);font-weight:600" id="session-label">확인 중...</div>
            <div style="font-size:12px;font-weight:800;color:#FFFFFF" id="session-time"></div>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:10px;color:rgba(255,255,255,0.4)">다음 장</div>
          <div style="font-size:11px;font-weight:700;color:#D4A853" id="next-session-info"></div>
        </div>
      </div>
      <div id="kospi-bar" style="display:flex;gap:5px">
        <div style="flex:1;background:rgba(255,255,255,0.92);border-radius:7px;padding:5px 9px;border:1px solid rgba(212,168,83,0.3);box-shadow:0 2px 6px rgba(0,0,0,0.15)">
          <div style="font-size:10px;color:#8A7B68;margin-bottom:2px;font-weight:600">KOSPI</div>
          <div id="kospi-value" style="font-size:13px;font-weight:800;color:#1A1A2E">--</div>
          <div id="kospi-change" style="font-size:11px;color:#8A7B68">--</div>
        </div>
        <div style="flex:1;background:rgba(255,255,255,0.92);border-radius:7px;padding:5px 9px;border:1px solid rgba(212,168,83,0.3);box-shadow:0 2px 6px rgba(0,0,0,0.15)">
          <div style="font-size:10px;color:#8A7B68;margin-bottom:2px;font-weight:600">KOSDAQ</div>
          <div id="kosdaq-value" style="font-size:13px;font-weight:800;color:#1A1A2E">--</div>
          <div id="kosdaq-change" style="font-size:11px;color:#8A7B68">--</div>
        </div>
        <div style="flex:1;background:rgba(255,255,255,0.92);border-radius:7px;padding:5px 9px;border:1px solid rgba(212,168,83,0.3);box-shadow:0 2px 6px rgba(0,0,0,0.15)">
          <div style="font-size:10px;color:#8A7B68;margin-bottom:2px;font-weight:600">거래대금</div>
          <div id="market-volume" style="font-size:13px;font-weight:800;color:#1A1A2E">--</div>
          <div style="font-size:10px;color:#8A7B68">조원</div>
        </div>
      </div>
    </div>
    <!-- 공포탐욕 미니 배너 -->
    <div id="fng-row" style="margin:0 12px 8px;display:flex;gap:8px;align-items:stretch">
      <!-- 공포탐욕 (좌, 축소) -->
      <div id="fng-bar" style="flex:0 0 40%;border-radius:10px;padding:6px 10px;background:linear-gradient(135deg,#FDF6E3,#F5E9C8);border:1px solid rgba(212,168,83,0.45);cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.15);display:flex;flex-direction:column;justify-content:center" onclick="switchTab('fng')">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:9px;color:#8A7350;font-weight:700">공포·탐욕</span>
          <span id="fng-label" style="font-size:9px;font-weight:700;color:#8A6D08;padding:1px 5px;border-radius:8px;background:rgba(184,134,11,0.18)">--</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span id="fng-score" style="font-size:17px;font-weight:900;color:#B8860B;line-height:1">--</span>
          <div style="flex:1;height:4px;background:rgba(138,115,80,0.2);border-radius:3px;overflow:hidden">
            <div id="fng-progress" style="height:100%;width:50%;background:linear-gradient(90deg,#DC2626,#D97706,#059669);border-radius:3px;transition:all 1s ease"></div>
          </div>
        </div>
      </div>
      <!-- 실시간 시장 수급 (우, 가로 압축) -->
      <div style="flex:1;border-radius:10px;padding:6px 10px;background:linear-gradient(135deg,#EAF2FB,#DCE9F7);border:1px solid rgba(59,130,246,0.3);box-shadow:0 2px 6px rgba(0,0,0,0.15);display:flex;flex-direction:column;justify-content:center">

          <div style="flex:1;text-align:center">
            <div style="font-size:9px;color:#5A6B7A;font-weight:600;margin-bottom:1px">외인</div>
            <div id="msup-외국인" style="font-size:11px;font-weight:800;color:#9C8B78">--</div>
          </div>
          <div style="width:1px;background:rgba(59,130,246,0.15)"></div>
          <div style="flex:1;text-align:center">
            <div style="font-size:9px;color:#5A6B7A;font-weight:600;margin-bottom:1px">기관</div>
            <div id="msup-기관" style="font-size:11px;font-weight:800;color:#9C8B78">--</div>
          </div>
          <div style="width:1px;background:rgba(59,130,246,0.15)"></div>
          <div style="flex:1;text-align:center">
            <div style="font-size:9px;color:#5A6B7A;font-weight:600;margin-bottom:1px">개인</div>
            <div id="msup-개인" style="font-size:11px;font-weight:800;color:#9C8B78">--</div>

// ── 탭 스와이프 ───────────────────────────────────────────────────────────
const TAB_ORDER = ['holdings','watchlist','news','ai','sector'];
let swipeStartX=0, swipeStartY=0;
document.addEventListener('DOMContentLoaded', ()=>{
  const tc = document.getElementById('tab-content');
  if(!tc) return;
  tc.addEventListener('touchstart', e=>{
    swipeStartX = e.touches[0].clientX;
    swipeStartY = e.touches[0].clientY;
  }, {passive:true});
  tc.addEventListener('touchend', e=>{
    const dx = e.changedTouches[0].clientX - swipeStartX;
    const dy = e.changedTouches[0].clientY - swipeStartY;
    if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)*1.5){
      // 섹터 탭에서는 좌우 스와이프 = 섹터 전환
      if(state.tab==="sector" && state.customSectors.length>1){
        if(dx < 0 && state.sectorView < state.customSectors.length-1){state.sectorView++;render();}
        else if(dx > 0 && state.sectorView > 0){state.sectorView--;render();}
        return;
      }
      const cur = TAB_ORDER.indexOf(state.tab);
      if(dx < 0 && cur < TAB_ORDER.length-1) switchTab(TAB_ORDER[cur+1]);
      if(dx > 0 && cur > 0) switchTab(TAB_ORDER[cur-1]);
    }
  }, {passive:true});
});

function rng(seed){let s=seed%2147483647;return()=>{s=s*16807%2147483647;return(s-1)/2147483646;}}
function genCandles(base,seed){const r=rng(seed),d=[];let p=base*(0.85+r()*0.3);for(let i=0;i<60;i++){const c=p*(0.97+r()*0.06),o=p*(0.98+r()*0.04),h=Math.max(o,c)*(1+r()*0.015),l=Math.min(o,c)*(1-r()*0.015);d.push({o,h,l,c});p=c;}return d;}
function computeRSI(candles,period=14){const gains=[],losses=[];for(let i=1;i<candles.length;i++){const d=candles[i].c-candles[i-1].c;gains.push(d>0?d:0);losses.push(d<0?-d:0);}const rsi=[...Array(period).fill(null)];let ag=gains.slice(0,period).reduce((a,b)=>a+b)/period,al=losses.slice(0,period).reduce((a,b)=>a+b)/period;rsi.push(al===0?100:100-100/(1+ag/al));for(let i=period;i<gains.length;i++){ag=(ag*(period-1)+gains[i])/period;al=(al*(period-1)+losses[i])/period;rsi.push(al===0?100:100-100/(1+ag/al));}return rsi;}
function computeLevels(candles){const recent=candles.slice(-20);const highs=recent.map(c=>c.h),lows=recent.map(c=>c.l),closes=recent.map(c=>c.c);const ma10=closes.slice(-10).reduce((a,b)=>a+b)/10;return{resistance2:Math.max(...highs),resistance1:highs.sort((a,b)=>b-a)[Math.floor(highs.length*0.25)],support1:lows.sort((a,b)=>a-b)[Math.floor(lows.length*0.25)],support2:Math.min(...lows),ma10};}
function getRsiSignal(rsi){if(rsi>=70)return{text:"과매수",color:"#1D4ED8"};if(rsi<=30)return{text:"과매도",color:"#DC2626"};if(rsi>=60)return{text:"강세",color:"#D97706"};if(rsi<=40)return{text:"약세",color:"#0369A1"};return{text:"중립",color:"#6B7280"};}
const fmt=v=>Math.round(v).toLocaleString("ko-KR");
const fmtPct=v=>(v>0?"+":"")+v.toFixed(2)+"%";
// 주식수 축약: 만주/천주 단위
function fmtShares(n){
  n=Math.abs(n);
  if(n>=10000)return (n/10000).toFixed(n>=100000?0:1)+"만주";
  if(n>=1000)return (n/1000).toFixed(1)+"천주";
  return Math.round(n).toLocaleString()+"주";
}

async function fetchSupply(codes){
  for(const code of codes){
    try{
      const res=await fetch(`${STOCK_API}/supply?symbol=${code}`);
      const d=await res.json();
      if(d && d.foreign){
        state.supplyData[code]=d;
      } else {
        // API 실패시 이전값 유지 or 기본값
        if(!state.supplyData[code]) state.supplyData[code]=defaultSupply(code);
      }
    }catch(e){
      if(!state.supplyData[code]) state.supplyData[code]=defaultSupply(code);
    }
    await new Promise(r=>setTimeout(r,200));
  }
}

// 장 마감/주말엔 마지막 데이터 그대로 유지 (랜덤 안씀)

  const h=code.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
  const fp=30+(h%40), ip=10+((h*3)%30);
  return{
    foreign:{pct:fp, net:0},
    institution:{pct:ip, net:0},
    individual:{pct:Math.max(100-fp-ip,5), net:0},
  };
}

function calcStockFng(code){
  const lc=liveChange(code);
  const sup=state.supplyData[code];
  const seed=code.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
  const candles=genCandles(STOCKS[code]?.price||10000,seed);
  const rsiArr=computeRSI(candles);
  const latestRsi=rsiArr.filter(v=>v!==null).slice(-1)[0]||50;
  const rsiScore=latestRsi;
  const changeScore=Math.min(100,Math.max(0,50+lc*10));
  let supScore=50;
  if(sup){const fn=sup.foreign.net,ин=sup.institution.net;supScore=Math.min(100,Math.max(0,50+(fn+ин)/200));}
  const score=Math.round(rsiScore*0.4+changeScore*0.3+supScore*0.3);
  return{score,...getFngColor(score),rsi:latestRsi};
}

// ── 차트 ─────────────────────────────────────────────────────────────────
function svgChart(candles,rsiArr,levels,W=340,H=160){
  const prices=candles.map(c=>[c.h,c.l]).flat();
  const mn=Math.min(...prices)*0.998,mx=Math.max(...prices)*1.002;
  const py=v=>Math.round((1-(v-mn)/(mx-mn))*H*0.75);
  const cw=Math.max(4,Math.floor(W/candles.length)-1);
  let svg=`<svg width="${W}" height="${H+50}" viewBox="0 0 ${W} ${H+50}" style="width:100%;height:auto">`;
  // 지지저항선
  const lineStyle=(y,color,dash="")=>`<line x1="0" y1="${py(y)}" x2="${W}" y2="${py(y)}" stroke="${color}" stroke-width="1" stroke-dasharray="${dash}" opacity="0.6"/>`;
  if(levels.resistance2<=mx&&levels.resistance2>=mn)svg+=lineStyle(levels.resistance2,"#1D4ED8","4,3");
  if(levels.resistance1<=mx&&levels.resistance1>=mn)svg+=lineStyle(levels.resistance1,"#F87171","3,2");
  if(levels.support1<=mx&&levels.support1>=mn)svg+=lineStyle(levels.support1,"#34D399","3,2");
  if(levels.support2<=mx&&levels.support2>=mn)svg+=lineStyle(levels.support2,"#DC2626","4,3");
  if(levels.ma10<=mx&&levels.ma10>=mn)svg+=lineStyle(levels.ma10,"#D97706");
  // 캔들
  candles.forEach((c,i)=>{
    const x=i*(cw+1),op=py(c.o),cp=py(c.c),hp=py(c.h),lp2=py(c.l);
    const isUp=c.c>=c.o;const col=isUp?"#DC2626":"#1D4ED8";
    svg+=`<line x1="${x+cw/2}" y1="${hp}" x2="${x+cw/2}" y2="${lp2}" stroke="${col}" stroke-width="1"/>`;
    svg+=`<rect x="${x}" y="${Math.min(op,cp)}" width="${cw}" height="${Math.max(1,Math.abs(op-cp))}" fill="${col}" rx="1"/>`;
  });
  // RSI
  const rBase=H*0.78,rH=H*0.2;
  const validRsi=rsiArr.filter(v=>v!==null);
  if(validRsi.length>1){
    const pts=validRsi.map((v,i)=>{const idx=rsiArr.indexOf(v,i===0?0:rsiArr.indexOf(validRsi[i-1]));return`${Math.round(idx*(W/rsiArr.length))},${Math.round(rBase+rH-(v/100)*rH)}`;}).join(" ");
    svg+=`<polyline points="${pts}" fill="none" stroke="#7C3AED" stroke-width="1.5" opacity="0.8"/>`;
    const last=validRsi[validRsi.length-1];
    const lastX=Math.round((rsiArr.lastIndexOf(last))*(W/rsiArr.length));
    const lastY=Math.round(rBase+rH-(last/100)*rH);
    const sig=getRsiSignal(last);
    svg+=`<circle cx="${lastX}" cy="${lastY}" r="3" fill="${sig.color}"/>`;
    svg+=`<text x="${W-5}" y="${lastY+4}" text-anchor="end" font-size="10" fill="${sig.color}" font-weight="700">RSI ${last.toFixed(0)}</text>`;
  }
  svg+=`</svg>`;return svg;
}

function sparkline(code,w=60,h=28){
  const seed=code.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
  const candles=genCandles(STOCKS[code]?.price||10000,seed).slice(-20);
  const prices=candles.map(c=>c.c);
  const mn=Math.min(...prices),mx=Math.max(...prices);
  const pts=prices.map((p,i)=>`${Math.round(i*(w/(prices.length-1)))},${Math.round((1-(p-mn)/(mx-mn||1))*h)}`).join(" ");
  const isUp=prices[prices.length-1]>=prices[0];
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="${isUp?"#DC2626":"#1D4ED8"}" stroke-width="1.5" stroke-linejoin="round"/></svg>`;
}

function parseImpact(t){
  const up=["상승","급등","돌파","호재","흑자","증가","신고가","반등"];
  const dn=["하락","급락","악재","부진","적자","감소","신저가","폭락"];
  const u=up.filter(w=>t.includes(w)).length,d=dn.filter(w=>t.includes(w)).length;
  return u>d?"상승압력":d>u?"하락압력":"중립";
}
function guessImportance(t){
  const hot=["긴급","속보","급등","급락","폭락","사상","최고","충격"];
  const mid=["상승","하락","발표","결정","실적","공시"];
  if(hot.some(w=>t.includes(w)))return"긴급";
  if(mid.some(w=>t.includes(w)))return"중요";
  return"일반";
}
function guessSectors(t){
  const map={"반도체":["삼성","하이닉스","반도체","HBM"],"IT":["네이버","카카오","AI","플랫폼"],"자동차":["현대","기아","전기차"],"바이오":["셀트리온","바이오","신약","FDA"],"금융":["금리","은행","금융"],"배터리":["배터리","전지","에너지소재"]};
  const found=[];
  Object.entries(map).forEach(([sec,words])=>{if(words.some(w=>t.includes(w)))found.push(sec);});
  return found.slice(0,2);
}

// ── 보조지표 계산 ─────────────────────────────────────────────────────────
function computeMACD(candles){
  const closes=candles.map(c=>c.c);
  function ema(data,period){
    const k=2/(period+1);let val=data[0];
    return data.map((p,i)=>{if(i===0)return val;val=p*k+val*(1-k);return val;});
  }
  const ema12=ema(closes,12),ema26=ema(closes,26);
  const macdLine=ema12.map((v,i)=>v-ema26[i]);
  const signal=ema(macdLine,9);
  const hist=macdLine.map((v,i)=>v-signal[i]);
  return{macdLine,signal,hist};
}

function computeBollinger(candles,period=20){
  const closes=candles.map(c=>c.c);
  return closes.map((c,i)=>{
    if(i<period-1)return null;
    const slice=closes.slice(i-period+1,i+1);
    const mean=slice.reduce((a,b)=>a+b)/period;
    const std=Math.sqrt(slice.reduce((a,b)=>a+Math.pow(b-mean,2),0)/period);
    return{upper:mean+2*std,middle:mean,lower:mean-2*std};
  });
}

function computeSignal(candles,rsiArr,levels,lp,lc){
  const rsi=rsiArr.filter(v=>v!==null).slice(-1)[0]||50;
  const macd=computeMACD(candles);
  const lastMacd=macd.hist[macd.hist.length-1];
  const boll=computeBollinger(candles).filter(v=>v!==null);
  const lastBoll=boll[boll.length-1];
  let buyScore=0,sellScore=0;
  // RSI
  if(rsi<30)buyScore+=3;else if(rsi<45)buyScore+=1;
  if(rsi>70)sellScore+=3;else if(rsi>60)sellScore+=1;
  // MACD
  if(lastMacd>0)buyScore+=2;else sellScore+=2;
  // 가격 vs 볼린저
  if(lastBoll){if(lp<=lastBoll.lower)buyScore+=2;else if(lp>=lastBoll.upper)sellScore+=2;}
  // 등락률
  if(lc<-3)buyScore+=1;if(lc>3)sellScore+=1;
  // 지지저항
  if(lp<levels.support1)buyScore+=1;if(lp>levels.resistance1)sellScore+=1;
  const total=buyScore+sellScore||1;
  if(buyScore>sellScore+2)return{signal:"매수",color:"#DC2626",bg:"#FEE2E2",border:"#FCA5A5",score:Math.round(buyScore/total*100),detail:"강한 매수 신호"};
  if(sellScore>buyScore+2)return{signal:"매도",color:"#1D4ED8",bg:"#FEE2E2",border:"#FCA5A5",score:Math.round(sellScore/total*100),detail:"강한 매도 신호"};
  if(buyScore>sellScore)return{signal:"약매수",color:"#D97706",bg:"#FEF3C7",border:"#FCD34D",score:Math.round(buyScore/total*100),detail:"약한 매수 우세"};
  if(sellScore>buyScore)return{signal:"약매도",color:"#9333EA",bg:"#F3E8FF",border:"#D8B4FE",score:Math.round(sellScore/total*100),detail:"약한 매도 우세"};
  return{signal:"중립",color:"#6B7280",bg:"#F9FAFB",border:"#E5E7EB",score:50,detail:"방향성 불명확"};
}

// ── 프리미엄 차트 SVG ─────────────────────────────────────────────────────
function premiumChart(candles,rsiArr,macd,boll,levels,W=340){
  const CHART_H=140,RSI_H=40,MACD_H=40,VOL_H=30,GAP=6;
  const TOTAL_H=CHART_H+RSI_H+MACD_H+VOL_H+GAP*3;
  const prices=candles.map(c=>[c.h,c.l]).flat();
  const mn=Math.min(...prices)*0.997,mx=Math.max(...prices)*1.003;
  const py=v=>Math.round((1-(v-mn)/(mx-mn))*CHART_H);
  const cw=Math.max(3,Math.floor(W/candles.length)-0.5);

  let svg=`<svg width="${W}" height="${TOTAL_H}" viewBox="0 0 ${W} ${TOTAL_H}" style="width:100%;height:auto;display:block">`;

  // ── 배경 그리드
  [0.25,0.5,0.75].forEach(r=>{
    const y=Math.round(CHART_H*r);
    svg+=`<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="#E8E3DB" stroke-width="0.5"/>`;
  });

  // ── 볼린저 밴드 (채워진 영역)
  const validBoll=boll.filter(v=>v!==null);
  if(validBoll.length>1){
    const offset=boll.length-validBoll.length;
    const ptUpper=validBoll.map((b,i)=>`${Math.round((i+offset)*cw+cw/2)},${py(b.upper)}`).join(" ");
    const ptLower=validBoll.map((b,i)=>`${Math.round((i+offset)*cw+cw/2)},${py(b.lower)}`).reverse().join(" ");
    svg+=`<polygon points="${ptUpper} ${ptLower}" fill="rgba(99,102,241,0.06)"/>`;
    // 중간선 (MA20)
    const ptMid=validBoll.map((b,i)=>`${Math.round((i+offset)*cw+cw/2)},${py(b.middle)}`).join(" ");
    svg+=`<polyline points="${ptMid}" fill="none" stroke="#818CF8" stroke-width="1" opacity="0.6"/>`;
    // 상단/하단 밴드
    svg+=`<polyline points="${ptUpper}" fill="none" stroke="#C7D2FE" stroke-width="0.8" opacity="0.8"/>`;
    svg+=`<polyline points="${validBoll.map((b,i)=>`${Math.round((i+offset)*cw+cw/2)},${py(b.lower)}`).join(" ")}" fill="none" stroke="#C7D2FE" stroke-width="0.8" opacity="0.8"/>`;
  }

  // ── MA5, MA20 이동평균선
  const closes=candles.map(c=>c.c);
  function sma(arr,n){return arr.map((v,i)=>i<n-1?null:arr.slice(i-n+1,i+1).reduce((a,b)=>a+b)/n);}
  const ma5=sma(closes,5),ma20=sma(closes,20);
  const drawMA=(arr,color)=>{
    const pts=arr.map((v,i)=>v!==null?`${Math.round(i*cw+cw/2)},${py(v)}`:null).filter(Boolean);
    if(pts.length>1)svg+=`<polyline points="${pts.join(" ")}" fill="none" stroke="${color}" stroke-width="1.2" opacity="0.8"/>`;
  };
  drawMA(ma5,"#F59E0B");drawMA(ma20,"#6366F1");

  // ── 지지/저항선
  const lineKV=[
    {v:levels.resistance2,c:"#1D4ED8",d:"5,3",lbl:"R2"},
    {v:levels.resistance1,c:"#1D4ED8",d:"3,2",lbl:"R1"},
    {v:levels.ma10,c:"#D97706",d:"2,2",lbl:"MA10"},
    {v:levels.support1,c:"#DC2626",d:"3,2",lbl:"S1"},
    {v:levels.support2,c:"#DC2626",d:"5,3",lbl:"S2"},
  ];
  lineKV.forEach(({v,c,d,lbl})=>{
    if(v<mn||v>mx)return;
    const y=py(v);
    svg+=`<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="${c}" stroke-width="0.8" stroke-dasharray="${d}" opacity="0.7"/>`;
    svg+=`<text x="${W-3}" y="${y-3}" text-anchor="end" font-size="8" fill="${c}" font-weight="600" opacity="0.8">${lbl}</text>`;
  });

  // ── 캔들
  candles.forEach((c,i)=>{
    const x=Math.round(i*cw),mid=Math.round(i*cw+cw/2);
    const op=py(c.o),cp=py(c.c),hp=py(c.h),lp2=py(c.l);
    const up=c.c>=c.o;const col=up?"#DC2626":"#1D4ED8";const bg=up?"#FEE2E2":"#FEE2E2";
    svg+=`<line x1="${mid}" y1="${hp}" x2="${mid}" y2="${lp2}" stroke="${col}" stroke-width="1"/>`;
    const bh=Math.max(1.5,Math.abs(op-cp));
    svg+=`<rect x="${x+0.5}" y="${Math.min(op,cp)}" width="${Math.max(cw-1,1)}" height="${bh}" fill="${col}" rx="0.5"/>`;
  });

  // ── 현재가 라인
  const curY=py(closes[closes.length-1]);
  svg+=`<line x1="0" y1="${curY}" x2="${W}" y2="${curY}" stroke="#1A1A2E" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.4"/>`;

  // ── 거래량 바 (VOL)
  const volBase=CHART_H+GAP;
  const vols=candles.map(c=>c.h-c.l); // 고저 차이로 대체
  const maxVol=Math.max(...vols)||1;
  candles.forEach((c,i)=>{
    const x=Math.round(i*cw),vH=Math.round((vols[i]/maxVol)*VOL_H);
    const up=c.c>=c.o;
    svg+=`<rect x="${x+0.5}" y="${volBase+VOL_H-vH}" width="${Math.max(cw-1,1)}" height="${vH}" fill="${up?"#FEE2E2":"#FEE2E2"}" rx="0.5" opacity="0.8"/>`;
  });
  svg+=`<text x="4" y="${volBase+10}" font-size="8" fill="#9C8B78" font-weight="600">VOL</text>`;

  // ── RSI 패널
  const rsiBase=CHART_H+VOL_H+GAP*2;
  svg+=`<rect x="0" y="${rsiBase}" width="${W}" height="${RSI_H}" fill="rgba(248,245,240,0.5)" rx="4"/>`;
  svg+=`<line x1="0" y1="${rsiBase+RSI_H*0.3}" x2="${W}" y2="${rsiBase+RSI_H*0.3}" stroke="#FCA5A5" stroke-width="0.5" stroke-dasharray="2,2"/>`;
  svg+=`<line x1="0" y1="${rsiBase+RSI_H*0.7}" x2="${W}" y2="${rsiBase+RSI_H*0.7}" stroke="#FCA5A5" stroke-width="0.5" stroke-dasharray="2,2"/>`;
  svg+=`<text x="4" y="${rsiBase+10}" font-size="8" fill="#9C8B78" font-weight="600">RSI</text>`;
  const validRsi=rsiArr.filter(v=>v!==null);
  if(validRsi.length>1){
    const rsiPts=validRsi.map((v,i)=>{
      const xi=Math.round((rsiArr.indexOf(v,i===0?0:rsiArr.lastIndexOf(validRsi[i-1]||0)))*cw+cw/2);
      const yi=rsiBase+RSI_H-(v/100)*RSI_H;
      return`${xi},${Math.round(yi)}`;
    }).join(" ");
    svg+=`<polyline points="${rsiPts}" fill="none" stroke="#7C3AED" stroke-width="1.5"/>`;
    const last=validRsi[validRsi.length-1];
    const lastY=rsiBase+RSI_H-(last/100)*RSI_H;
    const rCol=last>70?"#1D4ED8":last<30?"#DC2626":"#7C3AED";
    svg+=`<circle cx="${W-8}" cy="${Math.round(lastY)}" r="3" fill="${rCol}"/>`;
    svg+=`<text x="${W-14}" y="${Math.round(lastY)-5}" text-anchor="end" font-size="9" fill="${rCol}" font-weight="700">${last.toFixed(0)}</text>`;
  }

  // ── MACD 패널
  const macdBase=CHART_H+VOL_H+RSI_H+GAP*3;
  svg+=`<rect x="0" y="${macdBase}" width="${W}" height="${MACD_H}" fill="rgba(248,245,240,0.5)" rx="4"/>`;
  svg+=`<text x="4" y="${macdBase+10}" font-size="8" fill="#9C8B78" font-weight="600">MACD</text>`;
  const hists=macd.hist;
  const maxH=Math.max(...hists.map(Math.abs))||1;
  const mid=macdBase+MACD_H/2;
  svg+=`<line x1="0" y1="${mid}" x2="${W}" y2="${mid}" stroke="#E8E3DB" stroke-width="0.5"/>`;
  hists.forEach((v,i)=>{
    const x=Math.round(i*cw),bh=Math.round((Math.abs(v)/maxH)*(MACD_H/2-2));
    const col=v>=0?"rgba(220,38,38,0.7)":"rgba(220,38,38,0.7)";
    svg+=`<rect x="${x+0.5}" y="${v>=0?mid-bh:mid}" width="${Math.max(cw-1,1)}" height="${bh}" fill="${col}" rx="0.5"/>`;
  });

  svg+="</svg>";
  return svg;
}

// ── 종목 모달 (프리미엄) ──────────────────────────────────────────────────
const chartCache={};
async function fetchChart(code){
  if(chartCache[code]&&Date.now()-chartCache[code].t<300000)return chartCache[code].candles;
  try{
    const d=await fetch(`${STOCK_API}/chart?symbol=${code}`).then(r=>r.json());
    if(d.candles&&d.candles.length>10){
      chartCache[code]={candles:d.candles,t:Date.now()};
      return d.candles;
    }
  }catch(e){}
  return null;
}

async function runAI(code){
  const s=STOCKS[code];if(!s)return;
  state.aiLoading=true;state.aiResult="";render();
  try{
    const lp=livePrice(code),lc=liveChange(code);
    // 실제 차트로 지표 계산
    let candles=await fetchChart(code);
    if(!candles||candles.length<20)candles=genCandles(lp||s.price,code.split("").reduce((a,c)=>a+c.charCodeAt(0),0));
    const closes=candles.map(c=>c.c);
    const rsiArr=computeRSI(candles);
    const rsi=Math.round(rsiArr.filter(v=>v!==null).slice(-1)[0]||50);
    const levels=computeLevels(candles);
    const hi52=Math.max(...candles.map(c=>c.h));
    const lo52=Math.min(...candles.map(c=>c.l));
    const pos52=Math.round((lp-lo52)/(hi52-lo52)*100);
    const ma5=closes.slice(-5).reduce((a,b)=>a+b,0)/5;
    const ma20=closes.slice(-20).reduce((a,b)=>a+b,0)/20;
    const ma60=closes.slice(-60).reduce((a,b)=>a+b,0)/Math.min(60,closes.length);
    const trend=ma5>ma20&&ma20>ma60?"정배열(상승추세)":ma5<ma20&&ma20<ma60?"역배열(하락추세)":"혼조";
    // 수급
    const sup=state.supplyData[code];
    let supStr="데이터없음";
    if(sup){
      const f=sup.foreign?.net||0,o=sup.institution?.net||0,i=sup.individual?.net||0;
      supStr=`외국인 ${f>=0?"순매수":"순매도"} ${Math.abs(f).toLocaleString()}주, 기관 ${o>=0?"순매수":"순매도"} ${Math.abs(o).toLocaleString()}주, 개인 ${i>=0?"순매수":"순매도"} ${Math.abs(i).toLocaleString()}주`;
    }
    // 최근 5일 등락
    const last5=candles.slice(-5).map(c=>c.c);
    const chg5=last5.length>=2?((last5[last5.length-1]-last5[0])/last5[0]*100).toFixed(1):"0";

    // 증권사 컨센서스
    let consStr="데이터없음";
    let reportStr="";
    try{
      const cons=await fetch(`${STOCK_API}/consensus?symbol=${code}`).then(r=>r.json());
      if(cons.targetPrice>0){
        const upside=((cons.targetPrice-lp)/lp*100).toFixed(1);
        consStr=`증권사 평균 목표주가 ${cons.targetPrice.toLocaleString()}원 (현재가 대비 ${upside>=0?"+":""}${upside}%)${cons.opinion?`, 투자의견 ${cons.opinion}`:""}${cons.per?`, PER ${cons.per}`:""}`;
      }else if(cons.per){
        consStr=`PER ${cons.per}${cons.pbr?`, PBR ${cons.pbr}`:""}`;
      }
      if(cons.reports&&cons.reports.length){
        reportStr=cons.reports.slice(0,4).map(r=>`· ${r.broker}: ${r.title}`).join("\n");
      }
    }catch(e){}

    const prompt=`아래는 ${s.name}(${code})의 ${new Date().toLocaleDateString("ko-KR")} 기준 실시간 데이터입니다. 이 수치들만 근거로 실전 매매 관점에서 구체적으로 분석하세요. 일반론·교과서적 설명 금지, 추측성 미래 단정 금지. 반드시 아래 숫자를 인용하며 분석.

[현재 시세]
- 현재가 ${lp.toLocaleString()}원 (당일 ${lc>=0?"+":""}${lc.toFixed(2)}%, 최근5일 ${chg5}%)
- 52주 범위 ${lo52.toLocaleString()}~${hi52.toLocaleString()} (현재 ${pos52}% 위치)

[기술적 지표]
- RSI(14): ${rsi} ${rsi>=70?"(과매수)":rsi<=30?"(과매도)":"(중립)"}
- 이동평균: 5일 ${Math.round(ma5).toLocaleString()} / 20일 ${Math.round(ma20).toLocaleString()} / 60일 ${Math.round(ma60).toLocaleString()} → ${trend}
- 지지선 ${Math.round(levels.support1).toLocaleString()} / 저항선 ${Math.round(levels.resistance1).toLocaleString()}

[수급]
- ${supStr}

[증권사 컨센서스]
- ${consStr}
${reportStr?`\n[최근 증권사 리포트]\n${reportStr}`:""}

다음 형식으로 한국어 450자 이내:
📊 현재 상태: (RSI·이평·52주위치 종합 한 줄)
💰 수급 해석: (외인/기관 매매 방향이 의미하는 것)
🏦 컨센서스: (증권사 목표주가 대비 현재 위치, 투자의견, 리포트 동향)
🎯 매매 전략: (구체적 진입가·목표가·손절가, 지지/저항+컨센서스 종합)`;

    state.aiResult=await callAI([{role:"user",content:prompt}],"chart");
  }catch(e){state.aiResult="AI 분석 오류: "+e.message;}
  state.aiLoading=false;render();
}

function renderSector(){
  const COLORS=["#2563EB","#7C3AED","#D97706","#DC2626","#0369A1","#EA580C","#DB2777","#64748B","#16A34A","#1D4ED8"];

  // 섹터 추가 버튼
  let h=`<button onclick="openAddSector()" style="width:100%;margin-bottom:10px;padding:10px;background:#FFFFFF;border:2px dashed #C8BFB5;border-radius:12px;color:#8C7B6E;font-size:14px;cursor:pointer;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px">
    <span style="font-size:17px">➕</span> 새 섹터 추가
  </button>`;

  if(!state.customSectors.length){
    return h+`<div style="text-align:center;padding:40px;color:#9C8B78">
      <div style="font-size:40px;margin-bottom:10px">📊</div>
      <div style="font-size:15px;margin-bottom:6px">섹터를 직접 만들어보세요!</div>
      <div style="font-size:13px;color:#C8BFB5">섹터 이름과 종목을 직접 추가할 수 있어요</div>
    </div>`;
  }

  // 현재 선택 섹터 인덱스 보정
  if(state.sectorView===undefined||state.sectorView>=state.customSectors.length)state.sectorView=0;
  const si=state.sectorView;

  // ── 가로 스와이프 섹터 탭 바 ──
  h+=`<div id="sector-tabbar" style="display:flex;gap:6px;overflow-x:auto;padding:2px 0 8px;-webkit-overflow-scrolling:touch;scrollbar-width:none">`;
  state.customSectors.forEach((sec,i)=>{
    const color=COLORS[i%COLORS.length];
    const active=i===si;
    const codes=(sec.codes||[]).filter(c=>STOCKS[c]);
    const avg=codes.length?codes.reduce((a,c)=>a+liveChange(c),0)/codes.length:0;
    const u=avg>=0;
    h+=`<button onclick="state.sectorView=${i};render()" style="flex-shrink:0;padding:7px 13px;border-radius:11px;border:1.5px solid ${active?color:"#E0D8CC"};background:${active?color:"#FFFFFF"};color:${active?"#fff":"#5A4F42"};font-size:13px;font-weight:${active?"800":"600"};cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;box-shadow:${active?`0 2px 8px ${color}55`:"none"}">
      <span>${sec.name}</span>
      ${codes.length?`<span style="font-size:11px;font-weight:700;color:${active?"#fff":(u?"#DC2626":"#1D4ED8")};opacity:${active?0.9:1}">${u?"+":""}${avg.toFixed(1)}%</span>`:""}
    </button>`;
  });
  h+=`</div>`;

  // ── 선택된 섹터의 종목 리스트 (일렬) ──
  const sec=state.customSectors[si];
  const color=COLORS[si%COLORS.length];
  const codes=sec.codes||[];
  // STOCKS에 없는 코드는 임시 등록해서 빠지지 않게 함
  codes.forEach(c=>{if(!STOCKS[c])STOCKS[c]={name:c,price:0,change:0,sector:"기타",_custom:true};});
  const validCodes=codes.slice();

  h+=`<div id="sector-pane" style="background:#FFFFFF;border-radius:14px;border:1.5px solid ${color}33;box-shadow:0 2px 10px rgba(26,26,46,0.06);overflow:hidden">
    <div style="padding:10px 13px;display:flex;justify-content:space-between;align-items:center;background:${color}12;border-bottom:1px solid ${color}22">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:9px;height:9px;border-radius:50%;background:${color}"></div>
        <span style="font-weight:800;font-size:15px;color:#1A1A2E">${sec.name}</span>
        <span style="font-size:11px;color:#9C8B78">${validCodes.length}종목</span>
      </div>
      <div style="display:flex;gap:6px">
        <button onclick="openEditSector(${si})" style="background:${color}1A;border:1px solid ${color}44;border-radius:7px;color:${color};padding:4px 10px;cursor:pointer;font-size:12px;font-weight:700">＋ 종목편집</button>
        <button onclick="deleteSector(${si})" style="background:#FEE2E2;border:1px solid #FCA5A5;border-radius:7px;color:#DC2626;padding:4px 8px;cursor:pointer;font-size:12px">삭제</button>
      </div>
    </div>`;

  if(validCodes.length===0){
    h+=`<div style="padding:30px;text-align:center;color:#9C8B78;font-size:13px">종목을 추가해보세요 → ＋ 종목편집</div>`;
  }else{
    // 컬럼 헤더
    h+=`<div style="display:flex;align-items:center;padding:7px 13px;background:#F8F5F0;border-bottom:1px solid #EDE8DF;font-size:11px;color:#9C8B78;font-weight:700">
      <span style="flex:1">종목명</span>
      <span style="width:88px;text-align:right">현재가</span>
      <span style="width:74px;text-align:right">등락률</span>
    </div>`;
    validCodes.forEach((code,i)=>{
      const lp=livePrice(code),lc=liveChange(code),u=lc>=0;
      const pc=u?"#DC2626":"#1D4ED8";
      const isOt=state.realPrices[code]?.is_overtime;
      h+=`<div class="reorder-item" data-list="sector" data-si="${si}" data-idx="${i}" data-code="${code}" style="display:flex;align-items:center;padding:9px 13px;border-bottom:${i<validCodes.length-1?"1px solid #F0ECE5":"none"};cursor:pointer" onclick="openStockModal('${code}')">
        <div style="flex:1;min-width:0;display:flex;align-items:center;gap:7px">
          <span class="drag-handle" data-list="sector" data-si="${si}" data-idx="${i}" style="cursor:grab;color:#C8BFB5;font-size:13px;width:16px;text-align:center;touch-action:none">⠿</span>
          <div style="min-width:0">
            <div style="font-size:14px;font-weight:700;color:#1A1A2E;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px">${STOCKS[code].name}${isOt?` <span style="font-size:8px;background:#6366F1;color:#fff;padding:0 3px;border-radius:3px">시간외</span>`:""}</div>
            <div style="font-size:10px;color:#B0A090">${code}</div>
          </div>
        </div>
        <span style="width:88px;text-align:right;font-size:14px;font-weight:700;color:#1A1A2E">${lp>0?lp.toLocaleString():"--"}</span>
        <span style="width:74px;text-align:right;font-size:13px;font-weight:800;color:${pc}">${u?"▲":"▼"}${Math.abs(lc).toFixed(2)}%</span>
      </div>`;
    });
  }
  h+=`<div style="height:3px;background:${color};opacity:0.5"></div></div>`;

  // 좌우 스와이프 힌트
  if(state.customSectors.length>1){
    h+=`<div style="text-align:center;margin-top:10px;font-size:11px;color:#B0A090">← 좌우로 스와이프하여 섹터 전환 (${si+1}/${state.customSectors.length}) →</div>`;
  }
  return h;
}

// ── 섹터 추가/편집 ────────────────────────────────────────────────────────
function openAddSector(){
  const name=prompt("섹터 이름을 입력하세요\n예) 반도체, 자동차, 바이오");
  if(!name||!name.trim())return;
  state.customSectors.push({name:name.trim(),codes:[]});
  saveCustomSectors();render();
  // 바로 편집 열기
  openEditSector(state.customSectors.length-1);
}

function deleteSector(si){
  if(!confirm(`"${state.customSectors[si].name}" 섹터를 삭제할까요?`))return;
  state.customSectors.splice(si,1);
  saveCustomSectors();render();
}

function renderSectorStockList(si){
  const sec=state.customSectors[si];
  if(!sec.codes.length)return`<div style="color:#9C8B78;font-size:13px;padding:8px">아직 종목이 없어요</div>`;
  return sec.codes.map((code,i)=>{
    const name=STOCKS[code]?.name||code;
    const lp=livePrice(code),lc=liveChange(code),u=lc>=0;
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:#FFFFFF;border-radius:10px;margin-bottom:6px;border:1px solid #E8E3DB">

        <div style="font-weight:700;font-size:14px;color:#1A1A2E">${name}</div>
        <div style="font-size:11px;color:#9C8B78">${code} ${lp>0?`· ${lp.toLocaleString()}원 <span style="color:${u?"#DC2626":"#1D4ED8"}">${u?"▲":"▼"}${Math.abs(lc).toFixed(2)}%</span>`:""}</div>
      </div>
      <button onclick="removeStockFromSector(${si},${i})" style="background:#FEE2E2;border:1px solid #FCA5A5;border-radius:7px;color:#DC2626;padding:5px 9px;cursor:pointer;font-size:12px">✕</button>
    </div>`;
  }).join("");
}

function closeSectorEdit(){
  document.getElementById('sector-edit-overlay')?.remove();
  render();
}

function renameSector(si){
  const name=document.getElementById('sector-name-input')?.value?.trim();
  if(!name)return;
  state.customSectors[si].name=name;
  saveCustomSectors();
  document.getElementById('sector-edit-overlay')?.remove();
  render();
}

// ── 섹터 종목 검색 (이름/코드 자동완성) ──────────────────────────────────
let sectorSearchTimer=null;
function sectorSearchInput(si,q){
  q=(q||"").trim();
  const box=document.getElementById('sector-search-results');
  if(!box)return;
  if(!q){box.innerHTML="";return;}

  // ① 로컬 STOCKS에서 즉시 검색 (이름 or 코드)
  const isCode=/^\d+$/.test(q);
  const local=Object.entries(STOCKS).filter(([code,s])=>
    isCode?code.startsWith(q):s.name.includes(q)
  ).slice(0,12);

  box.innerHTML=renderSectorSearchResults(si,local.map(([code,s])=>({code,name:s.name,sector:s.sector})));

  // ② 로컬 결과가 적고 서버검색 필요 시 worker 호출(디바운스)
  if(local.length<3){
    clearTimeout(sectorSearchTimer);
    sectorSearchTimer=setTimeout(async()=>{
      try{
        const d=await fetch(`${STOCK_API}/search?q=${encodeURIComponent(q)}`).then(r=>r.json());
        if(d.items&&d.items.length){
          // 로컬+서버 합치고 중복 제거
          const merged=[...local.map(([code,s])=>({code,name:s.name,sector:s.sector}))];
          const seen=new Set(merged.map(x=>x.code));
          d.items.forEach(it=>{if(!seen.has(it.code)){seen.add(it.code);merged.push(it);}});
          const cur=document.getElementById('sector-stock-input');
          if(cur&&cur.value.trim()===q)box.innerHTML=renderSectorSearchResults(si,merged.slice(0,15));
        }
      }catch(e){}
    },350);
  }
}

function renderSectorSearchResults(si,items){
  if(!items.length)return`<div style="font-size:12px;color:#9C8B78;padding:8px">검색 결과가 없어요. 종목명이나 6자리 코드를 입력해보세요.</div>`;
  return items.map(it=>{
    const already=state.customSectors[si].codes.includes(it.code);
    return `<div onclick="${already?'':`pickSectorStock(${si},'${it.code}','${(it.name||'').replace(/'/g,"")}','${(it.sector||'기타').replace(/'/g,"")}')`}"
      style="display:flex;align-items:center;justify-content:space-between;padding:9px 11px;background:${already?'#EDEAE3':'#FFFFFF'};border-radius:10px;margin-bottom:5px;border:1px solid #E8E3DB;cursor:${already?'default':'pointer'}">
      <div>
        <span style="font-weight:700;font-size:14px;color:#1A1A2E">${it.name||it.code}</span>
        <span style="font-size:11px;color:#9C8B78;margin-left:6px">${it.code}${it.sector?` · ${it.sector}`:''}</span>
      </div>
      <span style="font-size:12px;font-weight:700;color:${already?'#9C8B78':'#059669'}">${already?'추가됨':'+ 추가'}</span>
    </div>`;
  }).join("");
}

function pickSectorStock(si,code,name,sector){
  if(state.customSectors[si].codes.includes(code))return;
  if(!STOCKS[code]){STOCKS[code]={name:name||code,price:0,change:0,sector:sector||"기타",_custom:true};saveCustomStocks();}
  state.customSectors[si].codes.push(code);
  saveCustomSectors();
  // 입력창/결과 초기화 + 목록 갱신
  const input=document.getElementById('sector-stock-input');
  if(input)input.value='';
  const box=document.getElementById('sector-search-results');
  if(box)box.innerHTML='';
  const list=document.getElementById('sector-stock-list');
  if(list)list.innerHTML=renderSectorStockList(si);
  // 가격 없으면 백그라운드로 가져오기
  if(!livePrice(code)){
    fetch(`${STOCK_API}/?symbol=${code}`).then(r=>r.json()).then(d=>{
      if(d.price>0){state.realPrices[code]={...d,code};if(STOCKS[code])STOCKS[code].price=d.price;
        if(list)list.innerHTML=renderSectorStockList(si);}
    }).catch(()=>{});
  }
}

function removeStockFromSector(si,ci){
  state.customSectors[si].codes.splice(ci,1);
  saveCustomSectors();
  const list=document.getElementById('sector-stock-list');
  if(list)list.innerHTML=renderSectorStockList(si);
}

async function runBriefing(){
  state.briefLoading=true;state.briefResult="";render();
  try{
    // 보유 종목 손익까지
    const hold=state.holdings.map(h=>{
      const lp=livePrice(h.code),pnlPct=h.avgPrice>0?((lp-h.avgPrice)/h.avgPrice*100).toFixed(1):"0";
      return `${STOCKS[h.code]?.name||h.code}(${h.qty}주, 수익률${pnlPct>=0?"+":""}${pnlPct}%, 당일${fmtPct(liveChange(h.code))})`;
    }).join("; ")||"없음";
    const watch=state.watchlist.map(c=>`${STOCKS[c]?.name||c}(당일${fmtPct(liveChange(c))})`).join(", ")||"없음";
    const kospiEl=document.getElementById("kospi-value")?.textContent||"--";
    const kospiChg=document.getElementById("kospi-change")?.textContent||"";
    const fng=fngState.score||"--";
    // 시장 수급
    const msF=document.getElementById("msup-외국인")?.textContent||"--";
    const msO=document.getElementById("msup-기관")?.textContent||"--";
    const msI=document.getElementById("msup-개인")?.textContent||"--";

    const prompt=`당신은 한국 주식 실전 트레이더입니다. 아래 ${new Date().toLocaleDateString("ko-KR")} 실시간 데이터만 근거로 내 포트폴리오를 진단하고 오늘 행동지침을 주세요. 일반론 금지, 과거연도 언급 금지, 구체적 종목명과 수치로만 답변.

[시장] KOSPI ${kospiEl}(${kospiChg}), 공포탐욕 ${fng}
[시장수급] 외국인 ${msF}, 기관 ${msO}, 개인 ${msI}
[내 보유] ${hold}
[내 관심] ${watch}

다음 형식으로 300자 이내:
📈 시장 진단: (지수·수급·공포탐욕 종합)
🔥 내 종목 점검: (보유종목 중 주목/주의할 것을 수익률 근거로)
💡 오늘 행동지침: (구체적으로 무엇을 하라)`;
    state.briefResult=await callAI([{role:"user",content:prompt}],"chart");
  }catch(e){state.briefResult="브리핑 생성 오류. 잠시 후 다시 시도해주세요.";}
  state.briefLoading=false;render();
}

      <button onclick="closeSearch()" style="background:#F0EDE6;border:1px solid #C8BFB5;border-radius:8px;color:#6B5E52;padding:8px 12px;cursor:pointer;font-size:16px;flex-shrink:0">←</button>
      <input id="si" placeholder="종목명 또는 코드 검색..." oninput="updateSearch(this.value,window._searchMode||'${mode}')"
        style="flex:1;background:#FAF8F5;border:1.5px solid #C8BFB5;border-radius:10px;padding:11px 14px;color:#1A1A2E;font-size:15px;outline:none"/>
    </div>
    ${isChoose?`<div style="background:#FFFFFF;padding:8px 12px;border-bottom:1px solid #F0EDE6;display:flex;gap:6px">
      <button id="btn-watch" onclick="window._searchMode='watchlist';document.getElementById('btn-watch').style.cssText='flex:1;padding:8px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:13px;background:#7C3AED;color:#fff';document.getElementById('btn-hold').style.cssText='flex:1;padding:8px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:13px;background:#F0EDE6;color:#6B5E52';updateSearch(document.getElementById('si').value,'watchlist')"
        style="flex:1;padding:8px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:13px;background:#7C3AED;color:#fff">⭐ 관심종목</button>
      <button id="btn-hold" onclick="window._searchMode='holding';document.getElementById('btn-hold').style.cssText='flex:1;padding:8px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:13px;background:#059669;color:#fff';document.getElementById('btn-watch').style.cssText='flex:1;padding:8px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:13px;background:#F0EDE6;color:#6B5E52';updateSearch(document.getElementById('si').value,'holding')"
        style="flex:1;padding:8px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:13px;background:#F0EDE6;color:#6B5E52">💼 보유주식</button>
    </div>
    <div style="background:#EFF6FF;padding:5px 14px;border-bottom:1px solid #DBEAFE;font-size:12px;color:#3B82F6;font-weight:600">💡 위에서 추가할 목록을 선택하세요</div>`
    :`<div style="background:#FAFAF8;padding:7px 14px;border-bottom:1px solid #F5F0E8;font-size:12px;color:${isHolding?"#DC2626":"#7C3AED"};font-weight:600">
      ${isHolding?"💼 종목 선택 후 수량·단가 입력":"⭐ 이름 탭→차트 / ＋→관심목록 추가"}
    </div>`}
    <div id="sr" style="flex:1;overflow-y:auto;padding:12px"></div>
  </div>`);
  setTimeout(()=>{document.getElementById("si")?.focus();updateSearch("",window._searchMode||mode);},100);
}
function closeSearch(){document.getElementById("so")?.remove();}
function searchAndOpen(code){closeSearch();setTimeout(()=>openStockModal(code),150);}

function showHoldingInput(code){
  const ex=document.getElementById("hf-"+code);if(ex){ex.remove();return;}
  const par=document.getElementById("si-"+code);if(!par)return;
  const div=document.createElement("div");
  div.id="hf-"+code;div.style.cssText="padding:10px 12px;background:#D1FAE5;border-top:1px solid #6EE7B7";
  div.innerHTML=`<div style="font-size:12px;color:#059669;font-weight:700;margin-bottom:8px">📝 ${STOCKS[code]?.name||code} 보유 정보 입력</div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <input id="hq-${code}" type="number" placeholder="수량(주)" style="flex:1;background:#fff;border:1px solid #6EE7B7;border-radius:8px;padding:9px;font-size:14px;color:#1A1A2E;outline:none"/>
      <input id="ha-${code}" type="number" placeholder="평균단가(원)" style="flex:1;background:#fff;border:1px solid #6EE7B7;border-radius:8px;padding:9px;font-size:14px;color:#1A1A2E;outline:none"/>
    </div>
    <button onclick="confirmHolding('${code}')" style="width:100%;padding:10px;background:#059669;border:none;border-radius:8px;color:#fff;font-weight:700;font-size:14px;cursor:pointer">✓ 보유주식에 추가</button>`;
  par.appendChild(div);
}
function confirmHolding(code){
  const qty=parseInt(document.getElementById("hq-"+code)?.value||"0");
  const avg=parseInt(document.getElementById("ha-"+code)?.value||"0");
  if(!qty||!avg){alert("수량과 평균단가를 입력해주세요!");return;}
  addHolding(code,qty,avg);closeSearch();switchTab("holdings");
}

function searchItemHTML(code,name,sector,lp,lc,isUp,w,inH,isHolding,mode){
  return `<div id="si-${code}" style="background:#FFFFFF;border-radius:12px;margin-bottom:7px;border:1.5px solid #E8E3DB;box-shadow:0 1px 4px rgba(26,26,46,0.05);overflow:hidden">
    <div style="display:flex;align-items:center;padding:11px 12px">
      <div style="flex:1;cursor:pointer;min-width:0" onclick="${isHolding?`showHoldingInput('${code}')`:`searchAndOpen('${code}')`}">
        <div style="font-weight:700;font-size:14px;color:#1A1A2E;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div>
        <div style="font-size:12px;color:#9C8B78;margin-top:2px">${code}${sector?" · "+sector:""}</div>
      </div>
      <div style="text-align:right;margin:0 10px;flex-shrink:0">
        <div style="font-weight:800;font-size:14px;color:#1A1A2E">${lp>0?lp.toLocaleString()+"원":"--"}</div>
        <div style="font-size:12px;color:${isUp?"#DC2626":"#1D4ED8"};font-weight:700">${lp>0?(isUp?"▲":"▼")+Math.abs(lc).toFixed(2)+"%":"--"}</div>
      </div>
      ${isHolding
        ?`<button onclick="showHoldingInput('${code}')" style="background:#D1FAE5;border:1.5px solid #6EE7B7;border-radius:8px;color:#059669;padding:7px 11px;cursor:pointer;font-size:14px;font-weight:700;flex-shrink:0">${inH?"✓":"＋"}</button>`
        :`<button onclick="event.stopPropagation();if(${w})removeWatch('${code}');else addWatch('${code}');render();updateSearch(document.getElementById('si')?.value||'','${mode}')"
          style="background:${w?"#EDE9FE":"#F5F0E8"};border:1.5px solid ${w?"#A78BFA":"#C8BFB5"};border-radius:8px;color:${w?"#7C3AED":"#9C8B78"};padding:7px 11px;cursor:pointer;font-size:14px;font-weight:700;flex-shrink:0">${w?"✓":"＋"}</button>`}
    </div>
  </div>`;
}

function updateSearch(q,mode="watchlist"){
  const effectiveMode=mode==="choose"?(window._searchMode||"watchlist"):mode;
  const isHolding=effectiveMode==="holding";
  const el=document.getElementById("sr");if(!el)return;

  // 빈 검색어 → 기본 목록 표시
  if(!q.trim()){
    let h="";
    Object.entries(STOCKS).slice(0,24).forEach(([code,s])=>{
      const lp=livePrice(code),lc=liveChange(code),w=inWatch(code),isUp=lc>=0,inH=state.holdings.some(x=>x.code===code);
      h+=searchItemHTML(code,s.name,s.sector,lp,lc,isUp,w,inH,isHolding,mode);
    });
    el.innerHTML=h;
    clearTimeout(searchTimer);
    return;
  }

  // 로컬 STOCKS에서 즉시 검색
  const local=Object.entries(STOCKS).filter(([c,s])=>s.name.includes(q)||c.startsWith(q));

  if(local.length>0){
    // 로컬 결과가 있으면 바로 표시하고 KIS 검색은 하지 않음
    let h=`<div style="font-size:12px;color:#9C8B78;padding:4px 0 8px;font-weight:600">📌 검색 결과 (${local.length}개)</div>`;
    local.forEach(([c,s])=>{
      const lp=livePrice(c),lc=liveChange(c),w=inWatch(c),isUp=lc>=0,inH=state.holdings.some(x=>x.code===c);
      h+=searchItemHTML(c,s.name,s.sector,lp,lc,isUp,w,inH,isHolding,mode);
    });
    el.innerHTML=h;
    clearTimeout(searchTimer);
    return;
  }

  // 로컬에 없을 때만 KIS API 검색 (0.8초 디바운스)
  el.innerHTML=`<div style="text-align:center;padding:20px;color:#9C8B78"><div style="font-size:20px;margin-bottom:6px">🔍</div><div style="font-size:13px">"${q}" 전체 종목 검색 중...</div></div>`;

  clearTimeout(searchTimer);
  searchTimer=setTimeout(async()=>{
    // 검색 시작 전 오버레이가 아직 열려있는지 확인
    const el2=document.getElementById("sr");
    if(!el2)return;
    try{
      el2.innerHTML=`<div style="text-align:center;padding:20px;color:#7C3AED"><div style="font-size:20px;animation:spin 1s linear infinite;display:inline-block">⚙️</div><br><span style="font-size:13px">KIS에서 검색 중...</span></div>`;
      const res=await fetch(`${STOCK_API}/search?q=${encodeURIComponent(q)}`);
      const data=await res.json();
      const items=data.items||[];

      const el3=document.getElementById("sr");
      if(!el3)return; // 도중에 오버레이 닫혔으면 종료

      if(!items.length){
        el3.innerHTML=`<div style="text-align:center;padding:30px;color:#9C8B78"><div style="font-size:32px;margin-bottom:8px">🔍</div>"${q}" 검색 결과가 없어요<br><div style="font-size:13px;margin-top:6px;color:#C8BFB5">종목명 또는 코드로 검색해보세요</div></div>`;
        return;
      }

      let h=`<div style="font-size:12px;color:#7C3AED;padding:4px 0 8px;font-weight:600">📊 전체 검색 결과 (${items.length}개)</div>`;
      items.slice(0,30).forEach(item=>{
        if(!STOCKS[item.code]){STOCKS[item.code]={name:item.name,price:0,change:0,sector:item.sector||"기타",_custom:true};saveCustomStocks();}
        const lp=livePrice(item.code),lc=liveChange(item.code),w=inWatch(item.code),isUp=lc>=0,inH=state.holdings.some(x=>x.code===item.code);
        h+=searchItemHTML(item.code,item.name,`${item.market||""} ${item.sector||""}`.trim(),lp,lc,isUp,w,inH,isHolding,mode);
      });
      el3.innerHTML=h;
    }catch(e){
      const el2=document.getElementById("sr");
      if(el2)el2.innerHTML=`<div style="text-align:center;padding:30px;color:#DC2626"><div style="font-size:32px;margin-bottom:8px">⚠️</div>검색 오류가 발생했어요<br><div style="font-size:13px;margin-top:6px">잠시 후 다시 시도해주세요</div></div>`;
    }
  },800);
}

// ── render & switchTab ────────────────────────────────────────────────────
// ── 종목 순서 변경 (길게 눌러 드래그) ────────────────────────────────────
function moveItem(listType,si,from,to){
  let arr;
  if(listType==="holdings")arr=state.holdings;
  else if(listType==="watchlist")arr=state.watchlist;
  else if(listType==="sector")arr=state.customSectors[si]?.codes;
  if(!arr||from===to||to<0||to>=arr.length)return;
  const[item]=arr.splice(from,1);
  arr.splice(to,0,item);
  if(listType==="holdings")saveHoldings();
  else if(listType==="watchlist")saveWatchlist();
  else if(listType==="sector")saveCustomSectors();
}
let _reorderBound=false;
function initReorder(){
  if(_reorderBound)return;
  _reorderBound=true;
  const tc=document.getElementById("tab-content");
  if(!tc)return;
  let pressTimer=null,dragging=false,dragEl=null,startY=0,info=null;

  const onDown=(e)=>{
    const handle=e.target.closest(".drag-handle");
    if(!handle)return;
    const item=handle.closest(".reorder-item");
    if(!item)return;
    const touch=e.touches?e.touches[0]:e;
    startY=touch.clientY;
    info={list:handle.dataset.list,si:handle.dataset.si!==undefined?Number(handle.dataset.si):null,idx:Number(handle.dataset.idx)};
    pressTimer=setTimeout(()=>{
      dragging=true;dragEl=item;dragEl._targetIdx=info.idx;
      navigator.vibrate&&navigator.vibrate(30);
      item.style.opacity="0.9";
      item.style.transform="scale(1.02)";
      item.style.boxShadow="0 8px 24px rgba(0,0,0,0.28)";
      item.style.zIndex="100";item.style.position="relative";
    },250);
  };
  const onMove=(e)=>{
    if(pressTimer&&!dragging){
      const t=e.touches?e.touches[0]:e;
      if(Math.abs(t.clientY-startY)>10){clearTimeout(pressTimer);pressTimer=null;}
    }
    if(!dragging||!dragEl)return;
    if(e.cancelable)e.preventDefault();
    const t=e.touches?e.touches[0]:e;
    const dy=t.clientY-startY;
    dragEl.style.transform=`scale(1.02) translateY(${dy}px)`;
    const sel=`.reorder-item[data-list="${info.list}"]`+(info.si!==null?`[data-si="${info.si}"]`:"");
    const siblings=[...tc.querySelectorAll(sel)];
    const dr=dragEl.getBoundingClientRect();
    const dragMid=dr.top+dr.height/2;
    let newIdx=info.idx;
    siblings.forEach(sib=>{
      if(sib===dragEl)return;
      const r=sib.getBoundingClientRect();
      const mid=r.top+r.height/2;
      const sibIdx=Number(sib.dataset.idx);
      if(dragMid>mid&&sibIdx>info.idx)newIdx=Math.max(newIdx,sibIdx);
      if(dragMid<mid&&sibIdx<info.idx)newIdx=Math.min(newIdx,sibIdx);
    });
    dragEl._targetIdx=newIdx;
  };
  const onUp=()=>{
    if(pressTimer){clearTimeout(pressTimer);pressTimer=null;}
    if(dragging&&dragEl){
      const to=dragEl._targetIdx,from=info.idx,list=info.list,si=info.si;
      dragging=false;dragEl=null;const _info=info;info=null;
      if(to!==undefined&&to!==from)moveItem(list,si,from,to);
      render();
    }
  };
  tc.addEventListener("touchstart",onDown,{passive:false});
  tc.addEventListener("touchmove",onMove,{passive:false});
  tc.addEventListener("touchend",onUp);
  tc.addEventListener("mousedown",onDown);
  document.addEventListener("mousemove",onMove);
  document.addEventListener("mouseup",onUp);
}

function render(){
  const el=document.getElementById("tab-content");if(!el)return;
  if(state.tab==="holdings")el.innerHTML=renderHoldings();
  else if(state.tab==="watchlist")el.innerHTML=renderWatchlist();
  else if(state.tab==="sector")el.innerHTML=renderSector();
  else if(state.tab==="fng")el.innerHTML=renderFng();
  else if(state.tab==="news")el.innerHTML=renderNews();
  else if(state.tab==="ai")el.innerHTML=renderAITab();
  document.querySelectorAll("[data-openstock]").forEach(e=>e.addEventListener("click",()=>openStockModal(e.dataset.openstock)));
}

function switchTab(tab){
  state.tab=tab;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  if(tab==="news"&&!state.newsItems.length&&!state.newsLoading)fetchNews();
  render();
}

// ── Init ─────────────────────────────────────────────────────────────────



loadCustomStocks();
loadWatchlist();
initSupply();
initReorder();

// 조회 대상 코드 (관심 + 보유 + 섹터)
function getTargetCodes(){
  const sectorCodes=state.customSectors.flatMap(s=>s.codes);
  return [...new Set([...state.watchlist,...state.holdings.map(h=>h.code),...sectorCodes])];
}

// 초기 로드
loadRealPrices();   // ① 마지막 저장된 주가 즉시 복원
render();           // ② 캐시로 바로 화면 표시 (-- 대신 마지막 주가)
// 캐시된 마지막 갱신 시각 표시
(function(){
  const el=document.getElementById("last-update");
  if(el&&state.lastFetchTime)el.textContent=
    `${state.lastFetchTime.getHours()}:${String(state.lastFetchTime.getMinutes()).padStart(2,"0")} 마지막`;
})();
fetchMarketIndex();
fetchMarketSupply();

// ③ 관심/보유 종목을 먼저 빠르게 갱신 → 화면에 바로 반영
(async()=>{
  const priority=getTargetCodes();
  if(priority.length){
    await fetchRealPrices(priority);
    render();
    fetchSupply(priority).then(()=>render());
  }
  fetchFng();
  // ④ 나머지 전체 종목은 뒤이어 갱신
  const rest=Object.keys(STOCKS).filter(c=>!priority.includes(c));
  await fetchRealPrices(rest);
  render();
})();

// ── 수동 새로고침 (갱신 배지 탭) ─────────────────────────────────────────
let refreshing=false;
function updateLastTime(){
  const el=document.getElementById("last-update");
  if(el&&state.lastFetchTime)el.textContent=
    `${state.lastFetchTime.getHours()}:${String(state.lastFetchTime.getMinutes()).padStart(2,"0")}:${String(state.lastFetchTime.getSeconds()).padStart(2,"0")} 갱신`;
}
async function manualRefresh(){
  if(refreshing)return;
  refreshing=true;
  const dot=document.getElementById("live-dot");
  const el=document.getElementById("last-update");
  if(el)el.textContent="갱신 중...";
  if(dot)dot.style.animation="spin 0.8s linear infinite";
  try{
    await fetchMarketIndex();
    await fetchMarketSupply();
    const targets=getTargetCodes();
    const codes=targets.length?targets:Object.keys(STOCKS).slice(0,20);
    await fetchRealPrices(codes);
    if(targets.length)await fetchSupply(targets);
    await fetchFng();
    render();
    updateLastTime();
  }catch(e){}
  if(dot)dot.style.animation="pulse 1.5s infinite";
  refreshing=false;
}

// ── 30초마다 주가 갱신 ───────────────────────────────────────────────────
setInterval(async()=>{
  const targets=getTargetCodes();
  const codes=targets.length?targets:Object.keys(STOCKS).slice(0,20);
  await fetchRealPrices(codes);
  render();
  updateLastTime();
},30000);

// ── 2분마다 수급 갱신 ────────────────────────────────────────────────────
setInterval(async()=>{
  const targets=getTargetCodes();
  if(targets.length) await fetchSupply(targets);
  render();
},120000);

// ── 1분마다 지수 갱신 ────────────────────────────────────────────────────
setInterval(fetchMarketIndex,60000);
setInterval(fetchMarketSupply,60000);

updateSessionBar();setInterval(updateSessionBar,1000);
fetchFng();setInterval(fetchFng,3600000);
render();
</script>
