<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="manifest" href="manifest.json">
<title>PWA 진단 2</title>
<style>
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#0B3A2E;color:#fff;margin:0;padding:14px;font-size:15px;line-height:1.55}
h1{font-size:17px;margin:0 0 14px}
.row{background:#0f4a3a;border-radius:10px;padding:13px;margin-bottom:10px;word-break:break-all}
.ok{border-left:6px solid #34D399}
.bad{border-left:6px solid #EF4444}
.warn{border-left:6px solid #FBBF24}
.label{font-weight:700;font-size:14px;margin-bottom:5px}
.val{font-size:13px;opacity:.95;white-space:pre-wrap}
.big{font-size:16px;font-weight:800;padding:15px}
</style>
</head>
<body>
<h1>🔧 PWA 설치 거부 사유 진단</h1>
<div id="out"></div>

<script>
const out=document.getElementById('out');
function add(label,val,status){
  const d=document.createElement('div');
  d.className='row '+status;
  d.innerHTML='<div class="label">'+label+'</div><div class="val">'+val+'</div>';
  out.appendChild(d);
}

// 0. 현재 주소
add('현재 주소', location.href, 'ok');

// 1. manifest 실제 로딩 + 내용 검사
const ml=document.querySelector('link[rel="manifest"]');
fetch(ml.href).then(r=>{
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}).then(m=>{
  add('1. manifest 로딩', '성공 ✓', 'ok');

  // 필수 필드 하나하나 검사 (크롬 설치 조건)
  const checks=[];
  checks.push(['name 또는 short_name', (m.name||m.short_name)?'✓ '+(m.name||m.short_name):'❌ 없음', (m.name||m.short_name)?'ok':'bad']);
  checks.push(['start_url', m.start_url?'✓ '+m.start_url:'❌ 없음', m.start_url?'ok':'bad']);
  checks.push(['display', (m.display==='standalone'||m.display==='fullscreen'||m.display==='minimal-ui')?'✓ '+m.display:'❌ '+(m.display||'없음')+' (standalone 필요)', (m.display==='standalone'||m.display==='fullscreen'||m.display==='minimal-ui')?'ok':'bad']);

  // 아이콘: 192px과 512px이 둘 다 있어야 함 (크롬 핵심 조건)
  let has192=false, has512=false, iconDetail='';
  if(m.icons){
    m.icons.forEach(ic=>{
      const sz=ic.sizes||'';
      iconDetail+=sz+'('+(ic.purpose||'any')+') ';
      if(sz.includes('192'))has192=true;
      if(sz.includes('512'))has512=true;
    });
  }
  checks.push(['아이콘 192px', has192?'✓ 있음':'❌ 없음 (필수!)', has192?'ok':'bad']);
  checks.push(['아이콘 512px', has512?'✓ 있음':'❌ 없음 (필수!)', has512?'ok':'bad']);
  checks.push(['아이콘 목록', iconDetail||'없음', (has192&&has512)?'ok':'bad']);

  // 아이콘 URL 실제 접근 가능한지 테스트
  if(m.icons&&m.icons.length){
    const firstIcon=m.icons.find(ic=>(ic.sizes||'').includes('512'))||m.icons[0];
    const iconUrl=new URL(firstIcon.src, ml.href).href.slice(0,80);
    add('아이콘 src 앞부분', iconUrl+'...', firstIcon.src.startsWith('data:')?'ok':'warn');
  }

  checks.forEach(c=>add('  '+c[0], c[1], c[2]));

  // start_url이 현재 scope 안에 있는지
  if(m.scope){
    const scopeUrl=new URL(m.scope, ml.href).href;
    const startUrl=new URL(m.start_url, ml.href).href;
    const inScope=startUrl.startsWith(scopeUrl);
    add('  scope vs start_url', inScope?'✓ start_url이 scope 안에 있음':'❌ start_url('+startUrl+')이 scope('+scopeUrl+') 밖에 있음!', inScope?'ok':'bad');
    // 현재 페이지가 scope 안에 있는지
    const pageInScope=location.href.startsWith(scopeUrl);
    add('  현재 페이지 vs scope', pageInScope?'✓ 현재 페이지가 scope 안':'❌ 현재 페이지가 scope 밖 (이러면 설치 안 뜸)', pageInScope?'ok':'bad');
  }
}).catch(e=>{
  add('1. manifest 로딩', '❌ 실패: '+e.message, 'bad');
});

// 2. service worker 등록 + 활성화 확인
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(reg=>{
    add('2. sw.js 등록', '성공 ✓ scope: '+reg.scope, 'ok');
    return navigator.serviceWorker.ready;
  }).then(reg=>{
    add('3. sw 활성화(active)', reg.active?'✓ 활성화됨':'❌ 아직 활성화 안 됨', reg.active?'ok':'bad');
    add('  fetch 핸들러', '※ 설치하려면 sw에 fetch 이벤트 핸들러가 있어야 함 (sw.js에 있음)', 'ok');
  }).catch(e=>{
    add('2. sw.js 등록', '❌ 실패: '+e.message, 'bad');
  });
}else{
  add('2. 서비스워커', '❌ 미지원', 'bad');
}

// 4. beforeinstallprompt 이벤트 감지 (이게 떠야 설치 가능)
let got=false;
window.addEventListener('beforeinstallprompt', e=>{
  got=true;
  add('★ 결론: 설치 가능 이벤트', '✅✅✅ 크롬이 "설치 가능"으로 인식했습니다! 정상이에요.', 'ok');
});

// 5. 이미 설치된 앱인지
window.addEventListener('appinstalled', ()=>add('알림','이미 설치됨','warn'));

setTimeout(()=>{
  if(!got){
    add('★ 결론: 설치 가능 이벤트', '⚠️ 4초간 설치 이벤트가 안 떴습니다.\n\n→ 위에서 ❌ 빨간 줄을 찾으세요. 그게 크롬이 설치를 거부하는 정확한 이유입니다.\n→ 모두 ✓인데도 이벤트가 안 뜨면: 이미 설치됐거나, 캐시 문제(시크릿 탭에서 다시 열기)거나, 크롬이 잠깐 보류한 것입니다.', 'warn');
  }
},4000);
</script>
</body>
</html>
